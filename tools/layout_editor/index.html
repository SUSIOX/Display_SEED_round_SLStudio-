<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen5 Layout Editor - WYSIWYG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 300px;
            background: #2a2a2a;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #444;
        }
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .display {
            width: 240px;
            height: 240px;
            background: #000;
            border: 3px solid #444;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        .display-inner {
            position: absolute;
            top: 0;
            left: 10px;
            right: 10px;
            bottom: 0;
            pointer-events: none;
        }
        .element {
            position: absolute;
            cursor: move;
            user-select: none;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 1px dashed rgba(255,255,255,0.3);
        }
        .element.selected {
            border: 2px solid #00ff00;
            z-index: 100;
        }
        .element.dragging {
            opacity: 0.7;
            z-index: 1000;
        }
        .slider {
            background: #333;
            border-radius: 8px;
        }
        .btn {
            background: #2a2a2a;
            border-radius: 4px;
            color: #fff;
        }
        .label {
            background: transparent;
            color: #fff;
            font-size: 11px;
        }
        .title {
            color: #00ff00;
            font-weight: bold;
        }
        .motor-running {
            background: #ff5500 !important;
        }
        h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00ff00;
        }
        .control-group {
            margin-bottom: 15px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
        }
        .control-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 5px;
            background: #1a1a1a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 3px;
        }
        button {
            padding: 8px 12px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }
        button:hover {
            background: #00cc00;
        }
        .element-list {
            margin-top: 20px;
        }
        .element-item {
            padding: 8px;
            background: #333;
            margin-bottom: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .element-item:hover {
            background: #444;
        }
        .element-item.selected {
            background: #00ff00;
            color: #000;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 3px;
            font-family: monospace;
            font-size: 10px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        .grid-line {
            position: absolute;
            background: rgba(255,255,255,0.1);
        }
        .grid-line.h { width: 100%; height: 1px; }
        .grid-line.v { width: 1px; height: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Screen5 Layout Editor</h2>
        
        <div class="control-group">
            <label>Selected Element: <span id="sel-name">none</span></label>
        </div>
        
        <div class="control-group">
            <label>X Position (px)</label>
            <input type="number" id="pos-x" min="0" max="220">
            <label>Y Position (px)</label>
            <input type="number" id="pos-y" min="0" max="240">
            <label>Width (px)</label>
            <input type="number" id="size-w" min="10" max="220">
            <label>Height (px)</label>
            <input type="number" id="size-h" min="10" max="240">
        </div>
        
        <div class="control-group">
            <label>Text</label>
            <input type="text" id="elem-text">
        </div>
        
        <button onclick="generateCode()">Generate C Code</button>
        <button onclick="resetLayout()">Reset to Default</button>
        
        <div class="element-list" id="element-list">
            <label style="color: #00ff00; margin-bottom: 10px; display: block;">Elements:</label>
        </div>
        
        <div id="output"></div>
    </div>
    
    <div class="canvas-area">
        <div class="display" id="display">
            <div class="grid-lines" id="grid"></div>
            <div class="display-inner" id="canvas"></div>
        </div>
    </div>

    <script>
        // Default layout matching current ui_Screen5.c
        const defaultElements = [
            { id: 'title', type: 'title', text: 'SERVO TEST', x: 0, y: 5, w: 200, h: 20, color: '#00ff00' },
            { id: 'label1', type: 'label', text: 'AIL L:', x: 10, y: 30, w: 40, h: 15 },
            { id: 'slider1', type: 'slider', text: '', x: 50, y: 30, w: 100, h: 15 },
            { id: 'value1', type: 'label', text: '50%', x: 155, y: 30, w: 30, h: 15, color: '#00ff00' },
            { id: 'label2', type: 'label', text: 'AIL R:', x: 10, y: 55, w: 40, h: 15 },
            { id: 'slider2', type: 'slider', text: '', x: 50, y: 55, w: 100, h: 15 },
            { id: 'value2', type: 'label', text: '50%', x: 155, y: 55, w: 30, h: 15, color: '#00ff00' },
            { id: 'dropgear', type: 'btn', text: 'DROP: CLOSED', x: 10, y: 80, w: 200, h: 35 },
            { id: 'motortitle', type: 'label', text: 'MOTOR TEST (5s)', x: 0, y: 125, w: 200, h: 20, color: '#ffff00' },
            { id: 'm1', type: 'btn', text: 'M1', x: 15, y: 150, w: 90, h: 35 },
            { id: 'm2', type: 'btn', text: 'M2', x: 115, y: 150, w: 90, h: 35 },
            { id: 'm3', type: 'btn', text: 'M3', x: 15, y: 190, w: 90, h: 35 },
            { id: 'm4', type: 'btn', text: 'M4', x: 115, y: 190, w: 90, h: 35 },
        ];
        
        let elements = JSON.parse(JSON.stringify(defaultElements));
        let selectedId = null;
        let dragOffset = { x: 0, y: 0 };
        let isDragging = false;
        
        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            // Add grid lines every 20px
            for (let i = 20; i < 240; i += 20) {
                const h = document.createElement('div');
                h.className = 'grid-line h';
                h.style.top = i + 'px';
                grid.appendChild(h);
                
                const v = document.createElement('div');
                v.className = 'grid-line v';
                v.style.left = i + 'px';
                grid.appendChild(v);
            }
        }
        
        function renderElements() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            elements.forEach(el => {
                const div = document.createElement('div');
                div.className = `element ${el.type}`;
                div.id = `el-${el.id}`;
                div.style.left = el.x + 'px';
                div.style.top = el.y + 'px';
                div.style.width = el.w + 'px';
                div.style.height = el.h + 'px';
                if (el.color) div.style.color = el.color;
                div.textContent = el.text;
                
                div.addEventListener('mousedown', (e) => startDrag(e, el.id));
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectElement(el.id);
                });
                
                canvas.appendChild(div);
            });
            
            updateElementList();
        }
        
        function updateElementList() {
            const list = document.getElementById('element-list');
            // Keep the label
            const label = list.querySelector('label') || document.createElement('label');
            label.textContent = 'Elements:';
            label.style.color = '#00ff00';
            label.style.marginBottom = '10px';
            label.style.display = 'block';
            list.innerHTML = '';
            list.appendChild(label);
            
            elements.forEach(el => {
                const item = document.createElement('div');
                item.className = 'element-item';
                if (el.id === selectedId) item.classList.add('selected');
                item.textContent = `${el.id} (${el.type})`;
                item.onclick = () => selectElement(el.id);
                list.appendChild(item);
            });
        }
        
        function selectElement(id) {
            selectedId = id;
            const el = elements.find(e => e.id === id);
            if (!el) return;
            
            document.querySelectorAll('.element').forEach(e => e.classList.remove('selected'));
            document.getElementById(`el-${id}`)?.classList.add('selected');
            
            document.getElementById('sel-name').textContent = id;
            document.getElementById('pos-x').value = el.x;
            document.getElementById('pos-y').value = el.y;
            document.getElementById('size-w').value = el.w;
            document.getElementById('size-h').value = el.h;
            document.getElementById('elem-text').value = el.text;
            
            updateElementList();
        }
        
        function startDrag(e, id) {
            isDragging = true;
            selectElement(id);
            const el = elements.find(e => e.id === id);
            dragOffset.x = e.clientX - el.x;
            dragOffset.y = e.clientY - el.y;
            document.getElementById(`el-${id}`).classList.add('dragging');
        }
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !selectedId) return;
            
            const el = elements.find(e => e.id === selectedId);
            el.x = Math.max(0, Math.min(220 - el.w, e.clientX - dragOffset.x + 100)); // +100 for sidebar offset
            el.y = Math.max(0, Math.min(240 - el.h, e.clientY - dragOffset.y));
            
            const div = document.getElementById(`el-${selectedId}`);
            div.style.left = el.x + 'px';
            div.style.top = el.y + 'px';
            
            document.getElementById('pos-x').value = Math.round(el.x);
            document.getElementById('pos-y').value = Math.round(el.y);
        });
        
        document.addEventListener('mouseup', () => {
            if (isDragging && selectedId) {
                document.getElementById(`el-${selectedId}`)?.classList.remove('dragging');
            }
            isDragging = false;
        });
        
        // Input handlers
        ['pos-x', 'pos-y', 'size-w', 'size-h'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                if (!selectedId) return;
                const el = elements.find(e => e.id === selectedId);
                const val = parseInt(e.target.value) || 0;
                
                if (id === 'pos-x') el.x = val;
                else if (id === 'pos-y') el.y = val;
                else if (id === 'size-w') el.w = val;
                else if (id === 'size-h') el.h = val;
                
                const div = document.getElementById(`el-${selectedId}`);
                div.style.left = el.x + 'px';
                div.style.top = el.y + 'px';
                div.style.width = el.w + 'px';
                div.style.height = el.h + 'px';
            });
        });
        
        document.getElementById('elem-text').addEventListener('input', (e) => {
            if (!selectedId) return;
            const el = elements.find(e => e.id === selectedId);
            el.text = e.target.value;
            document.getElementById(`el-${selectedId}`).textContent = el.text;
        });
        
        function generateCode() {
            let code = `// Screen5 layout - generated from layout editor\n`;
            code += `// Apply these values to ui_Screen5.c\n\n`;
            
            elements.forEach(el => {
                if (el.id === 'title') {
                    code += `// Title\n`;
                    code += `lv_obj_align(title, LV_ALIGN_TOP_MID, 0, ${el.y});\n\n`;
                } else if (el.id.startsWith('label')) {
                    const num = el.id.replace('label', '');
                    code += `// Label ${num}\n`;
                    code += `lv_obj_align(label${num}, LV_ALIGN_TOP_LEFT, ${el.x}, ${el.y});\n\n`;
                } else if (el.id.startsWith('slider')) {
                    const num = el.id.replace('slider', '');
                    code += `// Servo Slider ${num}\n`;
                    code += `lv_obj_set_size(ui_ServoSlider${num}, ${el.w}, ${el.h});\n`;
                    code += `lv_obj_align(ui_ServoSlider${num}, LV_ALIGN_TOP_LEFT, ${el.x}, ${el.y});\n\n`;
                } else if (el.id.startsWith('value')) {
                    const num = el.id.replace('value', '');
                    code += `// Value label ${num}\n`;
                    code += `lv_obj_align(ui_ServoValue${num}, LV_ALIGN_TOP_LEFT, ${el.x}, ${el.y});\n\n`;
                } else if (el.id === 'dropgear') {
                    code += `// DropGear Button\n`;
                    code += `lv_obj_set_size(ui_DropGearBtn, ${el.w}, ${el.h});\n`;
                    code += `lv_obj_align(ui_DropGearBtn, LV_ALIGN_TOP_MID, 0, ${el.y});\n\n`;
                } else if (el.id === 'motortitle') {
                    code += `// Motor Title\n`;
                    code += `lv_obj_align(motor_title, LV_ALIGN_TOP_MID, 0, ${el.y});\n\n`;
                } else if (el.id.startsWith('m')) {
                    const idx = parseInt(el.id.replace('m', '')) - 1;
                    const x = el.x;
                    const y = el.y;
                    code += `// Motor ${idx + 1} Button (index ${idx})\n`;
                    code += `lv_obj_set_size(ui_MotorBtn[${idx}], ${el.w}, ${el.h});\n`;
                    code += `lv_obj_align(ui_MotorBtn[${idx}], LV_ALIGN_TOP_LEFT, ${x}, ${y});\n\n`;
                }
            });
            
            document.getElementById('output').textContent = code;
        }
        
        function resetLayout() {
            elements = JSON.parse(JSON.stringify(defaultElements));
            selectedId = null;
            document.getElementById('sel-name').textContent = 'none';
            renderElements();
        }
        
        // Initialize
        createGrid();
        renderElements();
    </script>
</body>
</html>
